<!-- Create a webpage using HTML5 semantic tags (header, nav, section, article, footer) to 
design a simple college website homepage. -->

<!DOCTYPE html>
<html>
    <body>
        <header>Graphic era university</header>
        <nav>
            <a href="#course">course</a> | <a href="#about">about</a>
        </nav>
        <section id="course">
            <article>
                <h2>course</h2>
                <p>b.tech , bca , bba</p>
                
            </article>
        </section>
        <section id="about">
            <article>
                <h2>about</h2>
                <p>a leading university in dehradun</p>
            </article>
        </section>
        <footer>
            <p>Lorem ipsum dolor sit amet.</p>
        </footer>
        
    </body>
</html>
