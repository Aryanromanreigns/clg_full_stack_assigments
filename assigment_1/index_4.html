<!-- Design an HTML webpage using iframe to display a navigation menu and main content. 
Clicking menu items should change the main content -->

<!DOCTYPE html>
<html>

<body>
    <h1>menu</h1>
    <a target="main" href="https://www.google.com">google</a>
    <a target="main" href="https://www.facebook.com">facebook</a>

    <iframe name="target" src="https://www.youtube.com"></iframe>
</body>
</html>
