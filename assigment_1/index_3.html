
<!-- Create an HTML registration form for a training program with text fields for name/email, 
radio buttons for gender, checkboxes for courses, and submit/reset buttons. -->


<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Training Program Registration</title>
</head>

<body>
    <form>
        Name: <input type="text" name="name" placeholder="enter your name"><br></br>
        Email: <input type="text" name="email" placeholder="enter your email"><br></br>

        Gender:
        <input type="radio" name="gender" value="M">male
        <input type="radio" name="gender" value="F">female<br></br>

        courses:
        <input type="checkbox" name="courses" value="html">Html 
        <input type="checkbox" name="courses" value="js">javascript
        <input type="checkbox" name="courses" value="css">css<br></br>
        <input type="submit" > <input type="reset">


        
        

        

    </form>


</body>
</html>
