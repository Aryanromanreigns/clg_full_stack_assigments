<!-- Write a JavaScript program using a for loop to print the multiplication table of a given 
number up to 10 -->

<!DOCTYPE html>
<html>
    <body>
        
        <script>
            let num = Number(prompt("enter a number"));
            for(let i = 1; i <=10 ; i++){
                document.write(num+"x"+i+"="+ num*i+"<br>")
            }
        </script>
    </body>
</html>
