<!-- Take two numbers and display: square root of first, power, max, min, absolute difference 
using Math functions -->

<!DOCTYPE html>
<html>
    <body>
        <script>
            let numone = Number(prompt("enter first number : "));
            let numtwo = Number(prompt("enter second number : "));

            document.write("sqrt = " + Math.sqrt(numone)+'<br>')
            document.write("power = " + Math.pow(numone,numtwo)+'<br>')
            document.write("maximum = " + Math.max(numone, numtwo)+'<br>')
            document.write("minimum = "+ Math.min(numone, numtwo)+ '<br>')
        </script>
    </body>
</html>
