<!-- Print numbers 1 to 50: 'Fizz' for multiples of 3, 'Buzz' for 5, 'FizzBuzz' for both, otherwise 
the number -->

<!DOCTYPE html>
<html>
    <body>
        <script>
            for(let i = 1 ; i <= 50 ; i++){
                if(i % 3 == 0){
                    document.write('fizz <br>')
                }
                else if(i % 5 == 0){
                    document.write("buzz <br>")
                }
                else if(i % 3 == 0 && i % 5 == 0){
                    document.write("fizzbuz <br>")
                }
                else{
                    document.write(i +'<br>')
                }
            }

        </script>
    </body>
</html>
