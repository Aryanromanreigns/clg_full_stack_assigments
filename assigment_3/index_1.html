<!-- Write a JavaScript program that takes a number as input and checks if it is positive, 
negative, or zero -->
<!DOCTYPE html>
<html>
    <body>
        <script>
            let num =  Number(prompt("enter a number : "));
            if(num==0){
                document.write("number is zero")
            }
            else if(num > 0){
                document.write("number is positive");
            }
            else{
                document.write("number is negative");
            }
        </script>
    </body>
</html>
