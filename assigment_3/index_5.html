<!-- Create a function calculateArea() that takes length and breadth, returns area, and 
displays the result -->

<!DOCTYPE html>
<html>
    <body>
        <script>
            function calculateArea(length , breadth){
                return length*breadth;
            }
            let length = Number(prompt("enter length : "))
            let breadth = Number(prompt("enter breadth : "))

            document.write("area = " + calculateArea(length,breadth));
        </script>
    </body>
</html>
