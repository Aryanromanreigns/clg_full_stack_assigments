<!-- Design a webpage demonstrating CSS features: color, font-family, font-size, font-style, 
font-weight, text-align, text-decoration, background-color. -->

<!DOCTYPE html>
<html>
    <style>
        .a{
            color: aqua;
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: large;
        }
        .b{
            font-style: oblique;
            font-weight: bold;
        }
        .c{
            text-align: center;
            text-decoration:dotted ;
        }
        .d{
            background-color: bisque;
        }

    </style>
    <body>
          <p class="a">Color, Font-Family, Font-Size</p>
  <p class="b">Font-Style, Font-Weight</p>
  <p class="c">Text-Align, Text-Decoration</p>
  <p class="d">Background-Color</p>
    </body>
</html>
