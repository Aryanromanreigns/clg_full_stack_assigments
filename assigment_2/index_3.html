<!-- Display student details in an HTML table (Roll No, Name, Course, Semester) with CSS 
borders, header background, text alignment, and padding -->
<!DOCTYPE html>
<html>
    <style>
        .head{
            background-color: blue;
        }
        .tables{
            text-align: center;
            padding: 5px;
        }

    </style>
    <body>
        <h1>student details</h1>
        <table class="tables" border="1px">
            <tr class="head"><th>name</th><th>roll no</th> <th>course</th> <th>semester</th></tr>
            <tr><td>aryan</td> <td>55</td> <td>b.tech</td> <td>6</td></tr>
            <tr><td>kumar</td> <td>56</td> <td>b.tech</td> <td>6</td></tr>

        </table>
    </body>
</html>
