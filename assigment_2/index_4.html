<!-- Create a student registration form (Name, Email, Password, Gender, Hobbies, Course 
dropdown, Submit/Reset). Apply CSS for layout, spacing, and button styling -->


<!DOCTYPE html>
<html>
    <style>
        .hi{
            background-color: green;
            color:white;
            
    
        }

    </style>
    <body>
        <form>
            Name:<input type="text" value="name" placeholder="enter your name"><br></br>
            Email:<input type="text" value="email" placeholder="enter your email"><br></br>
            Password:<input type="text" value="password" placeholder="enter your password"><br></br>
            Gender:<input type="radio" value="male">male 
            <input type="radio" value="female">female<br></br>
            Hobbies:<input type="checkbox" value="sports">sports
            <input type="checkbox" vlaue="music">music<br></br>
            Course:<select><option value="b.tech">b.tech</option><option>bca</option><option>bba</option></select><br></br>
            <input class="hi" type="submit"> <input class ="hi"type="reset">
        </form>

    </body>
</html>
